<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Риболовля 🎣</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#06141B;
    --bg-river:#0E2A3D;
    --teal:#16404D;
    --cyan:#3FA796;
    --amber:#E8A33D;
    --cream:#F2E9D8;
    --shadow:rgba(0,0,0,.45);
    --r-trash:#7C7468;
    --r-common:#9CA3AF;
    --r-uncommon:#5FB878;
    --r-rare:#4D8FE8;
    --r-epic:#B07CE8;
    --r-legendary:#E8A33D;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg-deep);overflow:hidden;}
  body{
    font-family:'Manrope',sans-serif;
    color:var(--cream);
    display:flex; justify-content:center;
  }
  #app{
    width:100%; max-width:480px; height:100vh; height:100dvh;
    display:flex; flex-direction:column;
    position:relative;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(63,167,150,0.10), transparent 55%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-river) 60%, var(--bg-deep) 100%);
  }
  /* ---------- HEADER ---------- */
  header{
    flex:0 0 auto;
    padding:14px 16px 10px;
    display:flex; align-items:center; gap:10px;
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .lvl-badge{
    font-family:'Fraunces',serif; font-weight:700; font-size:15px;
    background:var(--amber); color:#1a1308;
    border-radius:50%; width:38px; height:38px;
    display:flex; align-items:center; justify-content:center;
    flex:0 0 auto;
    box-shadow:0 2px 0 rgba(0,0,0,.25);
  }
  .xp-wrap{flex:1; min-width:0;}
  .xp-label{font-size:10px; letter-spacing:.06em; text-transform:uppercase; opacity:.65; margin-bottom:4px;}
  .xp-bar{height:7px; border-radius:5px; background:rgba(255,255,255,0.08); overflow:hidden;}
  .xp-fill{height:100%; background:linear-gradient(90deg,var(--cyan),var(--amber)); border-radius:5px; transition:width .4s ease;}
  .coins{
    flex:0 0 auto; font-family:'Fraunces',serif; font-weight:600; font-size:15px;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
    padding:7px 12px; border-radius:20px; display:flex; align-items:center; gap:6px;
    white-space:nowrap;
  }

  /* ---------- LOCATION ROW ---------- */
  .loc-row{
    flex:0 0 auto; display:flex; gap:8px; padding:10px 16px 8px;
    overflow-x:auto; border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .loc-row::-webkit-scrollbar{display:none;}
  .loc-chip{
    flex:0 0 auto; display:flex; align-items:center; gap:6px;
    padding:8px 13px; border-radius:14px; font-size:12px; font-weight:700;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
    color:var(--cream); white-space:nowrap;
  }
  .loc-chip .ic{font-size:15px;}
  .loc-chip.active{background:rgba(232,163,61,.18); border-color:var(--amber); color:var(--amber);}
  .loc-chip.locked{opacity:.55;}
  .loc-chip .lock-cost{font-size:10px; opacity:.75; margin-left:1px;}

  /* ---------- WATER SCENE ---------- */
  .scene{
    position:relative; flex:1 1 auto; overflow:hidden;
    min-height:0; transition:filter .3s ease;
  }
  .scene.loc-lake{filter:hue-rotate(35deg) saturate(1.05);}
  .scene.loc-sea{filter:hue-rotate(-22deg) saturate(1.25) brightness(1.05);}
  .stars{position:absolute; inset:0; opacity:.5; pointer-events:none;}
  .stars span{position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; opacity:.4; animation:twinkle 3s infinite ease-in-out;}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.7}}

  .water{
    position:absolute; left:0; right:0; bottom:0; top:42%;
    background:linear-gradient(180deg, rgba(22,64,77,0.9) 0%, rgba(6,20,27,0.97) 100%);
    border-top:2px solid rgba(63,167,150,0.35);
  }
  .water::before{
    content:""; position:absolute; inset:0; opacity:.18;
    background-image:repeating-linear-gradient(180deg, rgba(255,255,255,.5) 0px, transparent 2px, transparent 22px);
    animation:waterShift 5s linear infinite;
  }
  @keyframes waterShift{0%{background-position-y:0}100%{background-position-y:22px}}

  .line{
    position:absolute; left:50%; top:0; width:1px; background:rgba(242,233,216,.55);
    transform:translateX(-50%);
  }
  .bobber{
    position:absolute; left:50%; transform:translate(-50%,-50%);
    font-size:26px; filter:drop-shadow(0 3px 4px rgba(0,0,0,.5));
    transition:top .25s ease-out;
    animation:bob 2.2s ease-in-out infinite;
  }
  @keyframes bob{0%,100%{margin-top:0}50%{margin-top:-6px}}
  .bobber.biting{animation:bite .35s ease-in-out infinite;}
  @keyframes bite{0%,100%{margin-top:0; transform:translate(-50%,-50%) rotate(0)}50%{margin-top:4px; transform:translate(-50%,-50%) rotate(8deg)}}

  .ripple{
    position:absolute; border:2px solid rgba(63,167,150,.45);
    border-radius:50%; left:50%; top:0; transform:translate(-50%,-50%);
    pointer-events:none; animation:rippleOut 1.8s ease-out forwards;
  }
  @keyframes rippleOut{0%{width:6px;height:6px;opacity:.8}100%{width:140px;height:140px;opacity:0}}

  .status-banner{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    font-family:'Fraunces',serif; font-weight:600; font-size:15px;
    background:rgba(6,20,27,0.7); border:1px solid rgba(255,255,255,.1);
    padding:8px 18px; border-radius:20px; white-space:nowrap;
    backdrop-filter:blur(3px);
    transition:color .2s;
  }
  .status-banner.alert{color:var(--amber); animation:pulseAlert .5s infinite;}
  @keyframes pulseAlert{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.08)}}

  .bite-timer{
    position:absolute; bottom:10px; left:16px; right:16px; height:5px;
    background:rgba(255,255,255,.08); border-radius:4px; overflow:hidden; display:none;
  }
  .bite-timer-fill{height:100%; background:var(--amber); width:100%;}

  /* ---------- ACTION ZONE ---------- */
  .action-zone{
    flex:0 0 auto; padding:16px 18px 8px; display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .cast-btn{
    width:100%; max-width:280px;
    font-family:'Fraunces',serif; font-weight:700; font-size:18px;
    background:linear-gradient(180deg,var(--cyan),#2c8276);
    color:#06201c; border:none; border-radius:18px; padding:16px 0;
    box-shadow:0 4px 0 #1d5c53, 0 6px 14px rgba(0,0,0,.35);
    transition:transform .08s ease;
  }
  .cast-btn:active{transform:translateY(3px); box-shadow:0 1px 0 #1d5c53;}
  .cast-btn.pull{background:linear-gradient(180deg,var(--amber),#b9762a); color:#241404; box-shadow:0 4px 0 #7a4d1b,0 6px 14px rgba(0,0,0,.35);}
  .cast-btn:disabled{opacity:.55; filter:grayscale(.3);}
  .hint{font-size:12px; opacity:.55; text-align:center; min-height:16px;}

  /* ---------- NAV ---------- */
  nav{
    flex:0 0 auto; display:flex; border-top:1px solid rgba(255,255,255,.07);
    background:rgba(6,20,27,.6);
  }
  nav button{
    flex:1; background:none; border:none; color:var(--cream); opacity:.55;
    font-family:'Manrope',sans-serif; font-weight:700; font-size:10px;
    padding:9px 0 11px; display:flex; flex-direction:column; align-items:center; gap:3px;
    position:relative;
  }
  nav button .ic{font-size:18px;}
  nav button.active{opacity:1; color:var(--amber);}
  nav button .badge-dot{
    position:absolute; top:5px; right:calc(50% - 16px);
    width:7px; height:7px; border-radius:50%; background:var(--amber);
    box-shadow:0 0 0 2px rgba(6,20,27,.6);
  }

  /* ---------- PANELS ---------- */
  .panel{
    position:absolute; inset:0; background:var(--bg-deep);
    display:flex; flex-direction:column; transform:translateY(100%);
    transition:transform .28s ease; z-index:5;
  }
  .panel.open{transform:translateY(0);}
  .panel-head{
    padding:16px 18px 12px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .panel-head h2{font-family:'Fraunces',serif; font-size:19px; margin:0;}
  .panel-head .close{background:none;border:none;color:var(--cream);font-size:22px;opacity:.6;padding:4px;}
  .panel-body{flex:1; overflow-y:auto; padding:12px 16px 90px;}

  .empty-state{text-align:center; opacity:.5; padding:60px 20px; font-size:13px; line-height:1.6;}

  .fish-row{
    display:flex; align-items:center; gap:12px; padding:10px 12px; margin-bottom:8px;
    background:rgba(255,255,255,.04); border-radius:14px; border:1px solid rgba(255,255,255,.06);
  }
  .fish-emoji{font-size:24px; flex:0 0 auto; width:36px; text-align:center;}
  .fish-info{flex:1; min-width:0;}
  .fish-name{font-weight:700; font-size:13.5px;}
  .fish-meta{font-size:11px; opacity:.6; margin-top:1px;}
  .rarity-dot{display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px;}
  .fish-count{font-family:'Fraunces',serif; font-weight:700; font-size:14px; opacity:.85; flex:0 0 auto;}
  .sell-btn{
    flex:0 0 auto; background:var(--teal); color:var(--cream); border:none; border-radius:10px;
    font-size:11.5px; font-weight:700; padding:8px 10px; white-space:nowrap;
  }
  .sell-all-bar{
    position:sticky; bottom:0; padding:10px 0 4px; background:linear-gradient(0deg,var(--bg-deep) 60%, transparent);
  }
  .sell-all-btn{
    width:100%; background:var(--amber); color:#251604; border:none; border-radius:14px;
    font-weight:800; font-size:14px; padding:13px 0;
  }

  .shop-section-title{font-size:11px; text-transform:uppercase; letter-spacing:.07em; opacity:.55; margin:14px 0 8px;}
  .shop-card{
    display:flex; align-items:center; gap:12px; padding:12px; margin-bottom:8px;
    border-radius:14px; border:1px solid rgba(255,255,255,.07); background:rgba(255,255,255,.04);
  }
  .shop-card.owned{border-color:rgba(95,184,120,.5); background:rgba(95,184,120,.08);}
  .shop-card.active{border-color:var(--amber); background:rgba(232,163,61,.1);}
  .shop-ic{font-size:24px; width:34px; text-align:center;}
  .shop-info{flex:1;}
  .shop-info .nm{font-weight:700; font-size:13.5px;}
  .shop-info .ds{font-size:11px; opacity:.6; margin-top:1px;}
  .shop-buy{
    flex:0 0 auto; border:none; border-radius:10px; font-weight:700; font-size:12px; padding:9px 12px;
    background:var(--cyan); color:#06201c; white-space:nowrap;
  }
  .shop-buy:disabled{background:rgba(255,255,255,.08); color:rgba(255,255,255,.35);}
  .shop-buy.tag{background:rgba(95,184,120,.25); color:#a9e8bb;}

  /* ---------- PROFILE CARD (in Shop) ---------- */
  .profile-card{
    display:flex; align-items:center; gap:12px; padding:13px; margin-bottom:14px;
    border-radius:16px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
  }
  .profile-ava{
    width:42px; height:42px; border-radius:50%; background:linear-gradient(160deg,var(--cyan),var(--teal));
    display:flex; align-items:center; justify-content:center; font-size:19px; flex:0 0 auto;
    overflow:hidden;
  }
  .profile-ava img{width:100%; height:100%; object-fit:cover; display:block;}
  .profile-info{flex:1; min-width:0;}
  .profile-name{font-weight:800; font-size:13.5px;}
  .profile-sub{font-size:11px; opacity:.6; margin-top:1px;}
  .profile-sync-btn{
    flex:0 0 auto; background:var(--teal); color:var(--cream); border:none; border-radius:10px;
    font-size:11px; font-weight:700; padding:9px 10px; white-space:nowrap;
  }

  /* ---------- QUESTS ---------- */
  .quest-row{
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06);
    border-radius:14px; padding:13px; margin-bottom:10px;
  }
  .quest-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px;}
  .quest-title{font-weight:700; font-size:13px; line-height:1.4;}
  .quest-reward{font-size:11px; opacity:.7; white-space:nowrap; flex:0 0 auto;}
  .quest-bar{height:6px; border-radius:4px; background:rgba(255,255,255,.08); overflow:hidden; margin-bottom:9px;}
  .quest-bar-fill{height:100%; background:var(--cyan); border-radius:4px; transition:width .3s ease;}
  .quest-claim{
    width:100%; border:none; border-radius:10px; padding:9px 0; font-weight:800; font-size:12.5px;
    background:var(--amber); color:#241404;
  }
  .quest-claim:disabled{background:rgba(255,255,255,.08); color:rgba(255,255,255,.35);}
  .quest-claim.done{background:rgba(95,184,120,.22); color:#a9e8bb;}
  .quest-reset-hint{text-align:center; font-size:11px; opacity:.45; margin-top:4px;}

  /* ---------- LEADERBOARD ---------- */
  .lb-row{
    display:flex; align-items:center; gap:10px; padding:10px 11px; border-radius:12px;
    margin-bottom:6px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05);
  }
  .lb-row.me{border-color:var(--amber); background:rgba(232,163,61,.08);}
  .lb-rank{font-family:'Fraunces',serif; font-weight:700; width:24px; text-align:center; opacity:.7; font-size:14px;}
  .lb-rank.top1{color:#FFD700; opacity:1;}
  .lb-rank.top2{color:#C9CFD6; opacity:1;}
  .lb-rank.top3{color:#CD7F32; opacity:1;}
  .lb-name{flex:1; font-size:13px; font-weight:700; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .lb-score{font-family:'Fraunces',serif; font-weight:700; font-size:13px; opacity:.85; flex:0 0 auto;}
  .lb-ava{
    width:28px; height:28px; border-radius:50%; flex:0 0 auto; overflow:hidden;
    background:linear-gradient(160deg,var(--cyan),var(--teal));
    display:flex; align-items:center; justify-content:center; font-size:13px;
  }
  .lb-ava img{width:100%; height:100%; object-fit:cover; display:block;}

  /* ---------- TOAST ---------- */
  .toast{
    position:absolute; bottom:78px; left:50%; transform:translateX(-50%) translateY(10px);
    background:rgba(20,20,20,.92); color:var(--cream); padding:10px 18px; border-radius:14px;
    font-size:12.5px; font-weight:700; opacity:0; pointer-events:none; z-index:20;
    transition:opacity .2s, transform .2s; white-space:nowrap; max-width:88%;
    text-overflow:ellipsis; overflow:hidden; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- CATCH MODAL ---------- */
  .modal-bg{
    position:absolute; inset:0; background:rgba(0,0,0,.6); display:none;
    align-items:center; justify-content:center; z-index:10; padding:24px;
  }
  .modal-bg.show{display:flex;}
  .catch-card{
    width:100%; max-width:300px; background:linear-gradient(180deg,var(--teal),var(--bg-river));
    border-radius:22px; padding:26px 22px; text-align:center;
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 18px 40px rgba(0,0,0,.5);
    animation:popIn .3s ease;
  }
  @keyframes popIn{0%{transform:scale(.85); opacity:0}100%{transform:scale(1); opacity:1}}
  .catch-emoji{font-size:54px; margin-bottom:6px;}
  .catch-rarity{font-size:11px; text-transform:uppercase; letter-spacing:.08em; font-weight:800; margin-bottom:4px;}
  .catch-name{font-family:'Fraunces',serif; font-weight:700; font-size:21px; margin-bottom:10px;}
  .catch-rewards{display:flex; justify-content:center; gap:16px; font-size:13px; opacity:.9; margin-bottom:18px;}
  .catch-rewards b{font-family:'Fraunces',serif; display:block; font-size:16px;}
  .catch-close{
    width:100%; background:var(--amber); color:#241404; border:none; border-radius:14px;
    font-weight:800; font-size:14px; padding:13px 0;
  }
  .catch-flavor{font-size:11.5px; opacity:.6; margin-top:10px; line-height:1.5;}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="lvl-badge" id="lvlBadge">1</div>
    <div class="xp-wrap">
      <div class="xp-label" id="xpLabel">Досвід 0/50</div>
      <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    </div>
    <div class="coins">💰 <span id="coinsVal">0</span></div>
  </header>

  <div class="loc-row" id="locRow"></div>

  <div class="scene" id="scene">
    <div class="stars" id="stars"></div>
    <div class="status-banner" id="statusBanner">Закинь вудку 🎣</div>
    <div class="line" id="line" style="height:42%;"></div>
    <div class="bobber" id="bobber" style="top:42%;">🔴</div>
    <div class="water"></div>
    <div class="bite-timer" id="biteTimer"><div class="bite-timer-fill" id="biteTimerFill"></div></div>
    <div class="toast" id="toast"></div>
  </div>

  <div class="action-zone">
    <button class="cast-btn" id="castBtn">Закинути вудку</button>
    <div class="hint" id="hint">Вудка: Звичайна · Наживка: Черв'як</div>
  </div>

  <nav>
    <button class="nav-btn active" data-tab="fish"><span class="ic">🎣</span>Рибалка</button>
    <button class="nav-btn" data-tab="quests"><span class="ic">📜</span>Квести<span class="badge-dot" id="questDot" style="display:none"></span></button>
    <button class="nav-btn" data-tab="inv"><span class="ic">🧺</span>Інвентар</button>
    <button class="nav-btn" data-tab="shop"><span class="ic">🛒</span>Магазин</button>
    <button class="nav-btn" data-tab="lb"><span class="ic">🏆</span>Топ</button>
  </nav>

  <!-- QUESTS PANEL -->
  <div class="panel" id="questsPanel">
    <div class="panel-head">
      <h2>Щоденні квести 📜</h2>
      <button class="close" data-close="quests">✕</button>
    </div>
    <div class="panel-body" id="questsBody"></div>
  </div>

  <!-- INVENTORY PANEL -->
  <div class="panel" id="invPanel">
    <div class="panel-head">
      <h2>Інвентар 🧺</h2>
      <button class="close" data-close="inv">✕</button>
    </div>
    <div class="panel-body" id="invBody"></div>
  </div>

  <!-- SHOP PANEL -->
  <div class="panel" id="shopPanel">
    <div class="panel-head">
      <h2>Магазин 🛒</h2>
      <button class="close" data-close="shop">✕</button>
    </div>
    <div class="panel-body" id="shopBody"></div>
  </div>

  <!-- LEADERBOARD PANEL -->
  <div class="panel" id="lbPanel">
    <div class="panel-head">
      <h2>Топ рибаків 🏆</h2>
      <button class="close" data-close="lb">✕</button>
    </div>
    <div class="panel-body" id="lbBody"></div>
  </div>

  <!-- CATCH MODAL -->
  <div class="modal-bg" id="catchModalBg">
    <div class="catch-card" id="catchCard"></div>
  </div>

</div>

<script>
(function(){
"use strict";

/* ============ TELEGRAM SDK ============ */
var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if(tg){ try{ tg.ready(); tg.expand(); }catch(e){} }

/* ============ FIREBASE CONFIG (optional, for global leaderboard) ============
   Заповни своїми даними з консолі Firebase (Project settings -> General ->
   Your apps -> SDK setup), щоб увімкнути загальний рейтинг гравців.
   Поки databaseURL порожній, розділ "Топ" показує лише твій локальний рахунок. */
var FIREBASE_CONFIG = {
  apiKey: "",
  authDomain: "",
  databaseURL: "",
  projectId: ""
};

/* ============ STORAGE (CloudStorage with in-memory fallback) ============ */
var memoryStore = {};
function storageSet(key, value){
  return new Promise(function(resolve){
    if(tg && tg.CloudStorage){
      tg.CloudStorage.setItem(key, value, function(){ resolve(); });
    } else {
      memoryStore[key] = value;
      resolve();
    }
  });
}
function storageGet(key){
  return new Promise(function(resolve){
    if(tg && tg.CloudStorage){
      tg.CloudStorage.getItem(key, function(err, value){ resolve(err ? null : value); });
    } else {
      resolve(memoryStore[key] || null);
    }
  });
}

/* ============ GAME DATA ============ */
var RARITY = {
  trash:      {label:"Сміття",     color:"var(--r-trash)",     weight:14, xp:1},
  common:     {label:"Звичайна",   color:"var(--r-common)",    weight:42, xp:4},
  uncommon:   {label:"Незвичайна", color:"var(--r-uncommon)",   weight:26, xp:9},
  rare:       {label:"Рідкісна",   color:"var(--r-rare)",       weight:12, xp:18},
  epic:       {label:"Епічна",     color:"var(--r-epic)",       weight:5,  xp:35},
  legendary:  {label:"Легендарна", color:"var(--r-legendary)",  weight:1,  xp:80}

/* ============ HELPERS ============ */
function fishById(id){ for(var i=0;i<FISH.length;i++){ if(FISH[i].id===id) return FISH[i]; } return null; }
function locById(id){ for(var i=0;i<LOCATIONS.length;i++){ if(LOCATIONS[i].id===id) return LOCATIONS[i]; } return null; }
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];
  });
}
function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i]; arr[i]=arr[j]; arr[j]=t;
  }
  return arr;
}
function todayStr(){
  var d=new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}
function avatarHtml(photoUrl, cssClass){
  if(photoUrl){
    return '<div class="'+cssClass+'"><img src="'+encodeURI(photoUrl)+'" onerror="this.parentNode.innerHTML=\'🎣\';" alt=""></div>';
  }
  return '<div class="'+cssClass+'">🎣</div>';
}
function grantLevelUps(){
  var leveled=false;
  while(state.xp >= xpToNext(state.level)){
    state.xp -= xpToNext(state.level);
    state.level += 1;
    leveled = true;
  }
  return leveled;
}

/* ============ LOCATIONS ============ */
function renderLocations(){
  var html = "";
  LOCATIONS.forEach(function(loc){
    var unlocked = state.unlockedLocations.indexOf(loc.id) !== -1;
    var active = state.location === loc.id;
    if(unlocked){
      html += '<div class="loc-chip'+(active?" active":"")+'" data-loc="'+loc.id+'">' +
        '<span class="ic">'+loc.icon+'</span>'+loc.name+'</div>';
    } else {
      html += '<div class="loc-chip locked" data-lock="'+loc.id+'">' +
        '<span class="ic">🔒</span>'+loc.name+
        '<span class="lock-cost">Рів.'+loc.unlockLevel+' · '+loc.unlockCost+'💰</span></div>';
    }
  });
  locRow.innerHTML = html;

  locRow.querySelectorAll("[data-loc]").forEach(function(el){
    el.addEventListener("click", function(){ selectLocation(el.getAttribute("data-loc")); });
  });
  locRow.querySelectorAll("[data-lock]").forEach(function(el){
    el.addEventListener("click", function(){ tryUnlockLocation(el.getAttribute("data-lock")); });
  });

  scene.classList.remove("loc-river","loc-lake","loc-sea");
  scene.classList.add("loc-"+state.location);
}

function selectLocation(id){
  if(gameState !== "idle") return;
  state.location = id;
  saveState();
  renderLocations();
}

function tryUnlockLocation(id){
  var loc = locById(id);
  if(!loc) return;
  if(state.level < loc.unlockLevel){
    showToast("Потрібен рівень "+loc.unlockLevel);
    return;
  }
  if(state.coins < loc.unlockCost){
    showToast("Не вистачає монет: потрібно "+loc.unlockCost+" 💰");
    return;
  }
  state.coins -= loc.unlockCost;
  state.unlockedLocations.push(loc.id);
  state.location = loc.id;
  saveState(); render();
  tgHaptic("success");
  showToast("Локацію \""+loc.name+"\" відкрито! 🎉");
}

function buyRod(i){
  var rod = RODS[i];
  if(state.coins < rod.cost || i <= state.rodTier) return;
  state.coins -= rod.cost; state.rodTier = i;
  saveState(); render(); tgHaptic("success");
}
function buyBait(i){
  var bait = BAITS[i];
  if(state.coins < bait.cost || i <= state.baitTier) return;
  state.coins -= bait.cost; state.baitTier = i;
  saveState(); render(); tgHaptic("success");
}

function sellOne(id){
  if(!state.inventory[id]) return;
  var f = fishById(id);
  state.inventory[id] -= 1;
  state.coins += f.price;
  if(state.inventory[id] <= 0) delete state.inventory[id];
  progressQuests("sell", {count:1, coins:f.price});
  saveState(); render(); tgHaptic("light");
}
function sellAllInventory(){
  var total = 0, count = 0;
  Object.keys(state.inventory).forEach(function(id){
    var f = fishById(id);
    total += f.price * state.inventory[id];
    count += state.inventory[id];
  });
  state.inventory = {};
  state.coins += total;
  progressQuests("sell", {count:count, coins:total});
  saveState(); render(); tgHaptic("success");
}

function tgHaptic(type){

      if(type==="success") tg.HapticFeedback.notificationOccurred("success");
      else if(type==="error") tg.HapticFeedback.notificationOccurred("error");
      else tg.HapticFeedback.impactOccurred("light");
    }catch(e){}
  }
}

/* ============ DAILY QUESTS ============ */
function ensureDailyQuests(){
  var today = todayStr();
  if(!state.quests || state.quests.date !== today){
    var pool = shuffle(QUEST_POOL.slice());
    var picked = pool.slice(0,3).map(function(q){
      return {id:q.id, progress:0, claimed:false};
    });
    state.quests = {date: today, list: picked};
    saveState();
  }
}

function questTpl(id){ for(var i=0;i<QUEST_POOL.length;i++){ if(QUEST_POOL[i].id===id) return QUEST_POOL[i]; } return null; }

function progressQuests(event, payload){
  ensureDailyQuests();
  var changed = false;
  state.quests.list.forEach(function(q){
    if(q.claimed) return;
    var t = questTpl(q.id);
    if(!t) return;
    if(t.type==="catchAny" && event==="catch"){
      q.progress = Math.min(t.count, q.progress+1); changed = true;
    } else if(t.type==="catchRarity" && event==="catch" && payload.rarity===t.rarity){
      q.progress = Math.min(t.count, q.progress+1); changed = true;
    } else if(t.type==="sellFish" && event==="sell"){
      q.progress = Math.min(t.count, q.progress+payload.count); changed = true;
    } else if(t.type==="earnCoins" && event==="sell"){
      q.progress = Math.min(t.count, q.progress+payload.coins); changed = true;
    }
  });
  if(changed) saveState();
}

function renderQuests(){
  ensureDailyQuests();
  var html = "";
  state.quests.list.forEach(function(q, i){
    var t = questTpl(q.id);
    if(!t) return;
    var pct = Math.min(100, (q.progress/t.count)*100);
    var ready = q.progress >= t.count && !q.claimed;
    html += '<div class="quest-row">' +
      '<div class="quest-top"><div class="quest-title">'+t.text+'</div>' +
      '<div class="quest-reward">+'+t.reward.coins+'💰 +'+t.reward.xp+'дс</div></div>' +
      '<div class="quest-bar"><div class="quest-bar-fill" style="width:'+pct+'%"></div></div>' +
      '<button class="quest-claim'+(q.claimed?" done":"")+'" data-claim="'+i+'" '+((ready)?"":"disabled")+'>' +
      (q.claimed ? "Отримано ✓" : ready ? "Забрати нагороду" : q.progress+"/"+t.count) +
      '</button></div>';
  });
  html += '<div class="quest-reset-hint">Квести оновлюються щодня 🌅</div>';
  questsBody.innerHTML = html;

  questsBody.querySelectorAll("[data-claim]").forEach(function(btn){
    btn.addEventListener("click", function(){ claimQuest(parseInt(btn.getAttribute("data-claim"))); });
  });
}

function claimQuest(i){
  var q = state.quests.list[i];
  var t = questTpl(q.id);
  if(!q || !t || q.claimed || q.progress < t.count) return;
  state.coins += t.reward.coins;
  state.xp += t.reward.xp;
  q.claimed = true;
  grantLevelUps();
  saveState(); render();
  tgHaptic("success");
  showToast("Нагороду отримано! +"+t.reward.coins+"💰");
}

function updateQuestDot(){
  var ready = state.quests && state.quests.list.some(function(q){
    var t = questTpl(q.id);
    return t && !q.claimed && q.progress >= t.count;
  });
  questDot.style.display = ready ? "block" : "none";
}

/* ============ BOT SYNC ============ */
function syncWithBot(){
  if(!tg || typeof tg.sendData !== "function"){
    showToast("Синхронізація доступна лише в Telegram");
    return;
  }
  var payload = {
    type: "fishing_sync",
    coins: state.coins,
    level: state.level,
    xp: state.xp,
    location: state.location
  };
  try{
    tg.sendData(JSON.stringify(payload));
    showToast("Дані відправлено боту ✅");
  }catch(e){
    showToast("Не вдалося синхронізувати");
  }
}

/* ============ LEADERBOARD (Firebase, optional) ============ */
function isFirebaseConfigured(){
  return !!(FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.databaseURL.length > 0);
}
function withTimeout(promise, ms){
  return new Promise(function(resolve, reject){
    var timer = setTimeout(function(){ reject(new Error("timeout")); }, ms);
    promise.then(function(v){ clearTimeout(timer); resolve(v); },
                 function(e){ clearTimeout(timer); reject(e); });
  });
}
var fb = {app:null, db:null, mod:null};
function loadFirebase(){
  if(fb.app) return Promise.resolve(fb);
  return Promise.all([
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js")
  ]).then(function(mods){
    var appMod = mods[0], dbMod = mods[1];
    fb.app = appMod.initializeApp(FIREBASE_CONFIG);
    fb.db = dbMod.getDatabase(fb.app);
    fb.mod = dbMod;
    return fb;
  });
}
function submitScore(){
  if(!isFirebaseConfigured()) return;
  var score = state.level*1000 + state.coins;
  var tgUser = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user : null;
  var uid = tgUser ? String(tgUser.id) : ("guest_" + (state.guestId || (state.guestId = Math.random().toString(36).slice(2))));
  var name = tgUser ? (tgUser.first_name || "Рибак") : "Гість";
  var photoUrl = tgUser && tgUser.photo_url ? tgUser.photo_url : null;
  withTimeout(loadFirebase(), 4000).then(function(){
    return fb.mod.set(fb.mod.ref(fb.db, "leaderboard/" + uid), {name:name, score:score, level:state.level, coins:state.coins, photoUrl:photoUrl});
  }).catch(function(e){ console.warn("Firebase submit failed", e); });
}
function renderLeaderboard(){
  if(!isFirebaseConfigured()){
    lbBody.innerHTML = '<div class="empty-state">Загальний рейтинг зʼявиться, коли розробник підключить базу даних.<br><br>Твій рахунок: <b>'+ (state.level*1000+state.coins) +'</b></div>';
    return;
  }
  lbBody.innerHTML = '<div class="empty-state">Завантаження...</div>';
  withTimeout(loadFirebase(), 4000).then(function(){
    return fb.mod.get(fb.mod.query(fb.mod.ref(fb.db, "leaderboard"), fb.mod.orderByChild("score"), fb.mod.limitToLast(20)));
  }).then(function(snap){
    var rows = [];
    snap.forEach(function(child){ rows.push(child.val()); });
    rows.sort(function(a,b){ return b.score - a.score; });
    if(rows.length === 0){
      lbBody.innerHTML = '<div class="empty-state">Ще немає результатів.<br>Будь першим! 🎣</div>';
      return;
    }
    var html = "";
    rows.slice(0,20).forEach(function(r, i){
      var rankClass = i===0?"top1":i===1?"top2":i===2?"top3":"";
      html += '<div class="lb-row"><div class="lb-rank '+rankClass+'">'+(i+1)+'</div>' +
        avatarHtml(r.photoUrl, "lb-ava") +
        '<div class="lb-name">'+escapeHtml(r.name||"Рибак")+'</div>' +
        '<div class="lb-score">'+r.score+'</div></div>';
    });
    lbBody.innerHTML = html;
  }).catch(function(){
    lbBody.innerHTML = '<div class="empty-state">Не вдалося завантажити рейтинг.<br>Перевір з’єднання.</div>';
  });
}

/* ============ TAB NAV ============ */
var panels = {inv: $("invPanel"), shop: $("shopPanel"), quests: $("questsPanel"), lb: $("lbPanel")};
function closeAllPanels(){
  Object.keys(panels).forEach(function(k){ panels[k].classList.remove("open"); });
}
document.querySelectorAll(".nav-btn").forEach(function(btn){
  btn.addEventListener("click", function(){
    var tab = btn.getAttribute("data-tab");
    document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    if(tab === "fish"){
      closeAllPanels();
    } else {
      closeAllPanels();
      panels[tab].classList.add("open");
      if(tab === "lb") renderLeaderboard();
    }
  });
});
document.querySelectorAll("[data-close]").forEach(function(btn){
  btn.addEventListener("click", function(){
    closeAllPanels();
    document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.remove("active"); });
    document.querySelector('[data-tab="fish"]').classList.add("active");
  });
});

/* ============ FISHING GAME LOOP ============ */
var gameState = "idle"; // idle -> waiting -> biting -> resolving
var biteTimeout = null, biteWindowTimeout = null;

function setBobberDepth(pct){
  bobber.style.top = pct + "%";
  line.style.height = pct + "%";
}

function spawnRipple(){
  var r = document.createElement("div");
  r.className = "ripple";
  r.style.top = bobber.style.top;
  scene.appendChild(r);
  setTimeout(function(){ r.remove(); }, 1800);
}

function startCast(){
  if(gameState !== "idle") return;
  gameState = "casting";
  castBtn.disabled = true;
  statusBanner.textContent = "Закидаємо... 🎣";
  statusBanner.classList.remove("alert");
  setBobberDepth(42);

  setTimeout(function(){
    setBobberDepth(58);
    spawnRipple();
    gameState = "waiting";
    statusBanner.textContent = "Чекаємо на клювання...";
    castBtn.textContent = "Чекати...";
    castBtn.disabled = true;

    var delay = 1200 + Math.random()*2200;
    biteTimeout = setTimeout(triggerBite, delay);
  }, 550);
}

function triggerBite(){
  if(gameState !== "waiting") return;
  gameState = "biting";
  bobber.classList.add("biting");
  spawnRipple();
  statusBanner.textContent = "ТЯГНИ!! 🐟";
  statusBanner.classList.add("alert");
  castBtn.disabled = false;
  castBtn.textContent = "ТЯГНИ!";
  castBtn.classList.add("pull");

  var rod = RODS[state.rodTier];
  var windowMs = rod.biteWindow * 1000;
  biteTimer.style.display = "block";
  biteTimerFill.style.transition = "none";
  biteTimerFill.style.width = "100%";
  requestAnimationFrame(function(){
    biteTimerFill.style.transition = "width " + windowMs + "ms linear";
    biteTimerFill.style.width = "0%";
  });

  biteWindowTimeout = setTimeout(function(){
    if(gameState === "biting") missBite();
  }, windowMs);
}

function missBite(){
  resetBiteUI();
  gameState = "idle";
  statusBanner.textContent = "Втекла... спробуй ще раз";
  statusBanner.classList.remove("alert");
  setBobberDepth(42);
  tgHaptic("error");
  setTimeout(function(){
    if(gameState === "idle") statusBanner.textContent = "Закинь вудку 🎣";
  }, 1600);
}

function resetBiteUI(){
  clearTimeout(biteTimeout); clearTimeout(biteWindowTimeout);
  bobber.classList.remove("biting");
  castBtn.classList.remove("pull");
  castBtn.textContent = "Закинути вудку";
  castBtn.disabled = false;
  biteTimer.style.display = "none";
}

function pickFish(){
  var rod = RODS[state.rodTier], bait = BAITS[state.baitTier];
  var loc = locById(state.location) || LOCATIONS[0];
  var weights = {};
  Object.keys(RARITY).forEach(function(k){ weights[k] = RARITY[k].weight; });
  weights.rare += rod.rareBonus;
  weights.epic += rod.rareBonus * 0.5 + bait.epicBonus;
  weights.legendary += bait.legBonus + rod.rareBonus * 0.05;

  var total = 0;
  Object.keys(weights).forEach(function(k){ total += weights[k]; });
  var roll = Math.random() * total;
  var acc = 0, chosenRarity = "common";
  for(var k in weights){
    acc += weights[k];
    if(roll <= acc){ chosenRarity = k; break; }
  }
  var pool = FISH.filter(function(f){ return f.rarity === chosenRarity && loc.fishIds.indexOf(f.id) !== -1; });
  if(pool.length === 0) pool = FISH.filter(function(f){ return f.rarity === chosenRarity; });
  return pool[Math.floor(Math.random() * pool.length)];
}

function successCatch(){
  resetBiteUI();
  gameState = "idle";
  setBobberDepth(42);
  statusBanner.textContent = "Закинь вудку 🎣";
  statusBanner.classList.remove("alert");

  var fish = pickFish();
  var r = RARITY[fish.rarity];
  state.inventory[fish.id] = (state.inventory[fish.id]||0) + 1;
  state.xp += r.xp;
  var leveled = grantLevelUps();
  progressQuests("catch", {rarity: fish.rarity});
  saveState();
  render();
  submitScore();
  tgHaptic(fish.rarity === "legendary" || fish.rarity === "epic" ? "success" : "light");
  showCatchModal(fish, r, leveled);
}

function showCatchModal(fish, r, leveled){
  catchCard.innerHTML =
    '<div class="catch-emoji">'+fish.emoji+'</div>' +
    '<div class="catch-rarity" style="color:'+r.color+'">'+r.label+'</div>' +
    '<div class="catch-name">'+fish.name+'</div>' +
    '<div class="catch-rewards">' +
      '<div>+'+r.xp+'<b>досвіду</b></div>' +
      '<div>'+fish.price+' 💰<b>ціна</b></div>' +
    '</div>' +
    (leveled ? '<div class="catch-flavor">🎉 Новий рівень: '+state.level+'!</div>' : "") +
    (fish.flavor ? '<div class="catch-flavor">'+fish.flavor+'</div>' : "") +
    '<button class="catch-close" id="catchCloseBtn">Чудово!</button>';
  catchModalBg.classList.add("show");
  $("catchCloseBtn").addEventListener("click", function(){
    catchModalBg.classList.remove("show");
  });
}

castBtn.addEventListener("click", function(){
  if(gameState === "idle"){ startCast(); }
  else if(gameState === "biting"){ successCatch(); }
});

/* ============ INIT ============ */
loadState().then(render);

})();
</script>
